version: "3.9"

services:

  # -------------------------------------------------------------------------
  # Ollama – local LLM server
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: rogi_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # On Windows with no GPU: remove the `deploy` section below
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # -------------------------------------------------------------------------
  # Open WebUI – chat interface
  # -------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rogi_open_webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama

  # -------------------------------------------------------------------------
  # n8n – workflow orchestration
  # -------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: rogi_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Lisbon
    volumes:
      - n8n_data:/home/node/.n8n

  # -------------------------------------------------------------------------
  # ROGI FastAPI backend
  # -------------------------------------------------------------------------
  rogi-backend:
    build:
      context: .
      dockerfile: rogi/Dockerfile
    container_name: rogi_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./rogi.db:/app/rogi.db
    depends_on:
      - ollama

volumes:
  ollama_data:
  open_webui_data:
  n8n_data:
